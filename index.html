<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KJV 聖經單字大師 (語音增強版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-inner { transition: transform 0.6s; transform-style: preserve-3d; }
        .flipped { transform: rotateY(180deg); }
        .card-front, .card-back { backface-visibility: hidden; position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .card-back { transform: rotateY(180deg); }
        .speaker-btn { cursor: pointer; transition: transform 0.2s; }
        .speaker-btn:active { transform: scale(1.2); }
    </style>
</head>
<body class="bg-stone-100 text-stone-800 font-serif">
    <div id="app" class="max-w-2xl mx-auto p-4 pb-20">
        <header class="text-center py-8">
            <h1 class="text-3xl font-bold text-stone-700">📖 KJV Bible Vocab</h1>
            <p class="text-xs text-stone-400 mt-1">點擊單字或經文即可發音</p>
            <div class="mt-4 flex justify-center gap-4">
                <button @click="switchMode('card')" :class="mode=='card'?'bg-stone-700 text-white':'bg-white'" class="px-6 py-2 rounded-full shadow transition">單字卡</button>
                <button @click="switchMode('quiz')" :class="mode=='quiz'?'bg-stone-700 text-white':'bg-white'" class="px-6 py-2 rounded-full shadow transition">多選測驗</button>
            </div>
        </header>

        <div v-if="!currentLesson" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div v-for="l in manifest" :key="l.id" @click="loadLesson(l.file)" 
                 class="p-6 bg-white rounded-xl shadow cursor-pointer hover:ring-2 hover:ring-stone-400 transition">
                <h3 class="font-bold text-lg">Lesson {{l.id}}</h3>
                <p class="text-sm text-stone-500">{{l.count}} 單字已就緒</p>
            </div>
        </div>

        <div v-else>
            <div class="flex justify-between items-center mb-6">
                <button @click="currentLesson=null" class="text-stone-500 hover:text-stone-800">← 返回</button>
                <span class="text-xs font-mono bg-stone-200 px-2 py-1 rounded">{{index + 1}} / {{quizData.length}}</span>
            </div>

            <div v-if="mode=='card'" class="relative h-96 w-full">
                <div class="card-inner w-full h-full cursor-pointer" :class="{flipped: isFlipped}" @click="isFlipped = !isFlipped">
                    <div class="card-front bg-white p-8 rounded-2xl shadow-xl flex flex-col justify-center items-center">
                        <span class="text-stone-400 text-sm mb-2">{{quizData[index].r}}</span>
                        <div class="flex items-center gap-3">
                            <h2 class="text-5xl font-extrabold text-stone-700">{{quizData[index].w}}</h2>
                            <span @click.stop="speak(quizData[index].w)" class="speaker-btn text-2xl">🔊</span>
                        </div>
                        <p class="mt-10 text-stone-300">點擊卡片查看解析</p>
                    </div>
                    <div class="card-back bg-stone-800 text-stone-100 p-8 rounded-2xl shadow-xl overflow-y-auto">
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="text-2xl font-bold text-amber-400">{{quizData[index].cd}}</h3>
                            <span @click.stop="speak(quizData[index].v)" class="speaker-btn text-xl">🔊</span>
                        </div>
                        <p class="text-sm leading-relaxed mb-4 opacity-90">{{quizData[index].ex}}</p>
                        <div class="text-xs border-t border-stone-600 pt-4 italic opacity-70">
                            {{quizData[index].v}}
                        </div>
                    </div>
                </div>
            </div>

            <div v-if="mode=='quiz'" class="space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-md relative">
                    <div class="flex justify-between items-center mb-2">
                        <h4 class="text-xs font-bold text-stone-400 uppercase tracking-widest">Context Clues</h4>
                        <span @click="speak(quizData[index].v)" class="speaker-btn text-lg">🔊</span>
                    </div>
                    <p class="text-lg leading-relaxed text-stone-700" v-html="clozeText"></p>
                </div>

                <div class="grid grid-cols-1 gap-3">
                    <button v-for="(opt, idx) in options" :key="idx" 
                            @click="checkAnswer(opt)"
                            :disabled="answered"
                            :class="getOptionClass(opt)"
                            class="p-4 text-left rounded-xl border-2 transition-all duration-200 font-medium">
                        {{ opt }}
                    </button>
                </div>

                <div v-if="answered" class="mt-4 p-4 bg-amber-50 rounded-xl border border-amber-100">
                    <p class="text-sm text-amber-800"><strong>解析：</strong>{{ quizData[index].ex }}</p>
                </div>
            </div>

            <div class="flex justify-between mt-8">
                <button @click="prevWord" :disabled="index === 0" class="px-4 py-2 disabled:opacity-30">上一個</button>
                <button @click="nextWord" class="px-8 py-2 bg-stone-700 text-white rounded-full shadow-lg hover:bg-stone-600">
                    {{ index === quizData.length - 1 ? '完成本課' : '下一個' }}
                </button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script>
        const { createApp, ref, computed } = Vue;
        createApp({
            setup() {
                const manifest = ref([]);
                const currentLesson = ref(null);
                const quizData = ref([]);
                const mode = ref('card');
                const index = ref(0);
                const isFlipped = ref(false);
                const answered = ref(false);
                const selectedAnswer = ref(null);
                const options = ref([]);

                // 語音朗讀功能
                const speak = (text) => {
                    // 移除經文中的標籤與特殊字元
                    const cleanText = text.replace(/⭐|\[.*?\]/g, '');
                    const synth = window.speechSynthesis;
                    const utter = new SpeechSynthesisUtterance(cleanText);
                    utter.lang = 'en-US'; 
                    utter.rate = 0.85; // 稍微放慢一點，更清晰
                    synth.cancel(); // 停止之前的朗讀
                    synth.speak(utter);
                };

                // 載入清單
                fetch('quiz_app_data/manifest.json')
                    .then(r => r.json())
                    .then(d => manifest.value = d)
                    .catch(e => console.error("無法讀取清單，請確認路徑或 CORS 限制", e));

                const loadLesson = async (file) => {
                    const res = await fetch(`quiz_app_data/${file}`);
                    quizData.value = await res.json();
                    currentLesson.value = file;
                    resetState();
                };

                const resetState = () => {
                    isFlipped.value = false;
                    answered.value = false;
                    selectedAnswer.value = null;
                    if(quizData.value[index.value]) {
                        const item = quizData.value[index.value];
                        options.value = [item.cd, ...item.ds].sort(() => Math.random() - 0.5);
                    }
                };

                const clozeText = computed(() => {
                    if (!quizData.value[index.value]) return "";
                    const word = quizData.value[index.value].w;
                    const verse = quizData.value[index.value].v;
                    const regex = new RegExp(`\\b${word}\\b`, 'gi');
                    return verse.replace(regex, `<span class="bg-amber-200 px-1 rounded font-bold text-stone-900 underline">____</span>`);
                });

                const checkAnswer = (opt) => {
                    if (answered.value) return;
                    selectedAnswer.value = opt;
                    answered.value = true;
                    // 答對時自動發音單字
                    if(opt === quizData.value[index.value].cd) speak(quizData.value[index.value].w);
                };

                const getOptionClass = (opt) => {
                    if (!answered.value) return 'bg-white border-stone-200 hover:border-stone-400';
                    const correct = quizData.value[index.value].cd;
                    if (opt === correct) return 'bg-green-100 border-green-500 text-green-700';
                    if (opt === selectedAnswer.value) return 'bg-red-100 border-red-500 text-red-700';
                    return 'bg-white border-stone-100 opacity-50';
                };

                const switchMode = (m) => { mode.value = m; resetState(); };
                const nextWord = () => { if(index.value < quizData.value.length - 1) { index.value++; resetState(); } else { currentLesson.value = null; } };
                const prevWord = () => { if(index.value > 0) { index.value--; resetState(); } };

                return { manifest, currentLesson, quizData, mode, index, isFlipped, answered, options, clozeText, loadLesson, nextWord, prevWord, checkAnswer, getOptionClass, switchMode, speak };
            }
        }).mount('#app');
    </script>
</body>
</html>
